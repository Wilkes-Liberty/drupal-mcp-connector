name: Release

# Publishes to npm when a v* tag is pushed (e.g. `git push origin v0.6.2`).
#
# Auth: npm **trusted publishing** via GitHub Actions OIDC — no token, no stored
# secret. npm trusts this exact repo+workflow identity (configured one-time on
# npmjs.com → package → Settings → Trusted Publisher). The `id-token: write`
# permission below lets the runner mint the OIDC token npm exchanges for a
# short-lived publish credential. Provenance is attached automatically.
#
# One-time setup (maintainer, on npmjs.com):
#   Package `drupal-mcp-connector` → Settings → Trusted Publishing → GitHub Actions
#     Organization/owner : Wilkes-Liberty
#     Repository         : drupal-mcp-connector
#     Workflow filename  : release.yml
#   (Leave "Environment" blank unless this job is pinned to one.)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write  # required for npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p 'require("./package.json").version')"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Tag and package.json agree on $PKG"

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test --if-present

      - name: Publish (trusted publishing — no token)
        run: npm publish --access public
