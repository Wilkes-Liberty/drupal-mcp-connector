name: Release

# Publishes to npm when a v* tag is pushed (e.g. `git push origin v0.6.2`).
#
# Auth note: the maintainer account uses a YubiKey (WebAuthn) for interactive
# 2FA, which cannot run in CI. Automated publishing therefore requires a
# **granular automation token** (npm → Access Tokens → Generate → "Automation")
# stored as the `NPM_TOKEN` repo secret. Automation tokens bypass 2FA by design;
# scope it to publish-only on this package.
#
# `--provenance` attaches a signed build-provenance statement (requires the
# `id-token: write` permission below) so consumers can verify the tarball was
# built by this workflow.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write  # required for npm provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p 'require("./package.json").version')"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Tag and package.json agree on $PKG"

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test --if-present

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
