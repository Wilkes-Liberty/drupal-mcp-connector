name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-syntax:
    name: Lint, Syntax & Unit (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 18 is the advertised floor (engines.node >=18.0.0); 0.6.1 fixed a
        # bare-`crypto`-global break on 18. Keep it green so the floor is real.
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check all source files
        run: |
          for f in src/lib/*.js src/tools/*.js src/index.js; do
            node --input-type=module --check < "$f" && echo "$f ✓"
          done

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test --if-present

  integration:
    name: Integration (Drupal)
    runs-on: ubuntu-latest
    needs: lint-and-syntax
    services:
      drupal:
        image: drupal:10-apache
        ports:
          - 80:80
        env:
          DRUPAL_DATABASE_HOST: db
          DRUPAL_DATABASE_NAME: drupal
          DRUPAL_DATABASE_USER: drupal
          DRUPAL_DATABASE_PASSWORD: drupal
      db:
        image: mariadb:10.11
        env:
          MYSQL_DATABASE: drupal
          MYSQL_USER: drupal
          MYSQL_PASSWORD: drupal
          MYSQL_ROOT_PASSWORD: root
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for Drupal
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost/; do sleep 2; done'

      - name: Run integration tests
        run: npm test --if-present
        env:
          DRUPAL_BASE_URL: http://localhost
          DRUPAL_USERNAME: admin
          DRUPAL_PASSWORD: admin
